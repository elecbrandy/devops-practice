apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: class-2
spec:
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: frontend
          image: __FE_IMAGE__
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: class-2
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer # 외부에서 접속하기 위해 LoadBalancer 사용 추천